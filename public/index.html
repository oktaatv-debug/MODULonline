<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MON AIRHORN</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial;background:#0d0d0d;color:#fff}.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px;background:linear-gradient(135deg,#000,#1f1600)}.card,.panel{background:#171717;border:1px solid #333;border-radius:16px;padding:18px;margin:14px 0}.card{width:min(430px,100%)}h1{text-align:center;color:#f6b21a}input,button,select{width:100%;padding:13px;margin:8px 0;border-radius:10px;font-size:15px}input,select{background:#090909;color:white;border:1px solid #444}button{background:#f6b21a;border:0;font-weight:bold}.blue{background:#1e88e5;color:white}.gray{background:#333;color:white}.app{display:none;max-width:1000px;margin:auto;padding:18px}.msg{white-space:pre-line;color:#ff8080;text-align:center}.ok{white-space:pre-line;color:#9eff9e}</style></head><body><div class="login" id="loginBox"><div class="card"><h1>MON AIRHORN</h1><p>Masukkan kode akses. 1 kode maksimal 2 HP.</p><input id="code" placeholder="Kode akses" style="text-transform:uppercase"><input id="pin" type="password" placeholder="PIN akses"><button class="blue" onclick="login()">MASUK</button><button onclick="buy()">BELI VIA WHATSAPP</button><div id="msg" class="msg"></div></div></div><div class="app" id="app"><h1>MON AIRHORN ONLINE</h1><div class="panel"><h3>Status</h3><div id="status" class="ok"></div><button class="gray" onclick="logout()">LOGOUT</button></div><div class="panel"><h3>Playlist MIDI</h3><select id="playlist"><option>Memuat...</option></select><button class="blue" onclick="loadMidi()">LOAD MIDI</button><div id="midiStatus" class="ok"></div></div><div class="panel"><h3>Kontrol Airhorn</h3><p>Tempat gabungkan kontrol/tester airhorn utama Anda.</p></div></div><script>
const WA_NUMBER="088219915904";function deviceId(){let id=localStorage.getItem("mon_device_id");if(!id){id="DEV-"+Math.random().toString(36).slice(2,10).toUpperCase()+"-"+Date.now().toString(36).toUpperCase();localStorage.setItem("mon_device_id",id)}return id}
function buy(){window.open("https://wa.me/62"+WA_NUMBER.replace(/^0/,"").replace(/\D/g,"")+"?text="+encodeURIComponent("Halo admin, saya mau beli kode akses MON AIRHORN."),"_blank")}
async function login(){const msg=document.getElementById("msg"),code=(document.getElementById("code").value||"").trim().toUpperCase(),pin=document.getElementById("pin").value||"";if(!code||!pin){msg.innerText="Isi kode dan PIN.";return}msg.innerText="Mengecek...";try{const res=await fetch("/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({code,pin,deviceId:deviceId(),userAgent:navigator.userAgent})});const d=await res.json();if(!d.ok){msg.innerText=d.message;return}localStorage.setItem("mon_session",JSON.stringify(d.user));showApp(d.user)}catch(e){msg.innerText=e.message}}
function showApp(u){document.getElementById("loginBox").style.display="none";document.getElementById("app").style.display="block";document.getElementById("status").innerText="Kode: "+u.code+"\nNama: "+(u.name||"-")+"\nExpired: "+(u.expired||"-")+"\nDevice: "+deviceId();loadPlaylist()}
function logout(){localStorage.removeItem("mon_session");location.reload()}async function loadPlaylist(){const sel=document.getElementById("playlist");try{const list=await fetch("/midi/manifest.json?t="+Date.now()).then(r=>r.json());sel.innerHTML="";list.forEach(m=>{let o=document.createElement("option");o.value=m.file;o.textContent=m.name;sel.appendChild(o)})}catch(e){sel.innerHTML="<option>Playlist gagal</option>"}}
function loadMidi(){document.getElementById("midiStatus").innerText="MIDI siap: /midi/"+document.getElementById("playlist").value}const s=localStorage.getItem("mon_session");if(s)try{showApp(JSON.parse(s))}catch(e){}
</script></body></html>
